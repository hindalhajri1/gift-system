<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>عيدية تراحم الشرقية</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>

<div class="page">
  <div class="panel">
    <div class="hero">
      <div class="badge">🎉 فعالية الموظفين</div>
      <h1>عيدية تراحم الشرقية</h1>
      <p>ادخل بياناتك وجرّب حظك 🎁</p>
    </div>

    <div class="form" id="form">
      <input type="text" id="name" placeholder="اسم الموظف">
      <input type="tel" id="mobile" placeholder="رقم الجوال مثال: 05xxxxxxxx">

      <select id="gender">
        <option value="">اختر الفئة</option>
        <option value="male">رجال</option>
        <option value="female">نساء</option>
      </select>

      <button onclick="start()">ابدأ السحب</button>
      <img id="giftImagePreview" style="display:none;">    </div>

    <div class="scratch-area" id="gifts" style="display:none;">
      <div class="real-scratch-card">
       
        <div class="prize-content">
          <span>هديتك</span>
          <strong id="giftText"></strong>
          <img id="giftImagePreview" class="gift-preview" style="display:none;">
        </div>
        <canvas id="scratchCanvas"></canvas>
      </div>
    </div>

    <div class="result" id="result"></div>
  </div>
</div>

<script src="assets/app.js"></script>

</body>
</html>
