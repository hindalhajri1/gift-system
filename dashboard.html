<script src="assets/app.js"></script>

<script>
async function loadDashboard() {

  const stats = await fetch("/api/stats").then(r => r.json());
  const results = await fetch("/api/results").then(r => r.json());

  document.getElementById("totalResults").innerText = stats.total;
  document.getElementById("remainingGifts").innerText = stats.remaining;
  document.getElementById("giftTypes").innerText = stats.types;

  const list = document.getElementById("resultList");

  if (results.length === 0) {
    list.innerHTML = "<p>لا توجد سحوبات حتى الآن.</p>";
    return;
  }

  list.innerHTML = results.map(item => `
    <div style="background:white;border:1px solid #e5eef5;border-radius:14px;padding:14px;margin-bottom:10px;">
      <b>${item.employee_name}</b><br>
      الهدية: ${item.gift_name}<br>
      التاريخ: ${item.created_at}
    </div>
  `).join("");
}

loadDashboard();
</script>
