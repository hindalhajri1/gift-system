<html lang="ar" dir="rtl">
    
  
   
<head>
    <div class="admin-topbar">

            <span id="userName" class="welcome-text">مرحباً</span>
        </div>
        <div class="topbar-left"></div>
            <a href="/cdn-cgi/access/logout?returnTo=https%3A%2F%2Fgift.hindtech.sa%2Fgifts.html" class="btn-logout">
                تسجيل خروج
            </a>
        </div>
    </div>
  <meta charset="UTF-8">
  <title>تقرير الهدايا</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>
    <header class="admin-topbar">

        <div class="topbar-right">
          <span id="userName" class="welcome-text">مرحباً</span>
        </div>
      
        <nav class="topbar-nav">
          <a href="gifts.html">إدارة الهدايا</a>
          <a href="dashboard.html">التقرير</a>
          <a href="index.html">صفحة السحب</a>
        </nav>
      
        <a href="/cdn-cgi/access/logout?returnTo=https%3A%2F%2Fgift.hindtech.sa%2Fgifts.html"
           class="btn-logout">
          تسجيل خروج
        </a>
      
      </header>
<div class="page">
  <div class="panel">
    <div class="hero">
      <div class="badge">التقرير</div>
      <h1>تقرير سحب الهدايا</h1>
      <p>متابعة المشاركين والهدايا المتبقية.</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <span>المشاركين</span>
        <strong id="totalResults">0</strong>
      </div>

      <div class="stat-card">
        <span>الهدايا المتبقية</span>
        <strong id="remainingGifts">0</strong>
      </div>

      <div class="stat-card">
        <span>أنواع الهدايا</span>
        <strong id="giftTypes">0</strong>
      </div>
    </div>

    <div class="section-card">
        <button onclick="resetResults()" class="btn-danger">
            حذف السحوبات
          </button>
          <a href="/api/export" class="btn-export">
            تحميل Excel
          </a>
      <h2 class="section-title">آخر السحوبات</h2>
      <div id="resultList"></div>
    </div>
  </div>
</div>

<script src="assets/app.js"></script>

<script>
async function loadDashboard() {
  const stats = await fetch("/api/stats").then(r => r.json());
  const results = await fetch("/api/results").then(r => r.json());

  document.getElementById("totalResults").innerText = stats.total || 0;
  document.getElementById("remainingGifts").innerText = stats.remaining || 0;
  document.getElementById("giftTypes").innerText = stats.types || 0;

  const list = document.getElementById("resultList");

  if (!results.length) {
    list.innerHTML = "<p>لا توجد سحوبات حتى الآن.</p>";
    return;
  }

  list.innerHTML = results.map(item => `
    <div class="list-card">
      <b>${item.employee_name}</b><br>
      الجوال: ${item.mobile || "-"}<br>
      الفئة: ${item.gender === "male" ? "رجال" : item.gender === "female" ? "نساء" : "-"}<br>
      الهدية: ${item.gift_name}<br>
      التاريخ: ${formatSaudiDate(item.created_at)}
    </div>
  `).join("");
}

function formatSaudiDate(dateString) {
  if (!dateString) return "-";

  const date = new Date(dateString + " UTC");

  return date.toLocaleString("ar-SA", {
    timeZone: "Asia/Riyadh",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

loadDashboard();
</script>
<script src="assets/app.js"></script>
<script>
  loadUser();
  loadDashboard();
</script>
</body>

</html>
